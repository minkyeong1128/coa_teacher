const DAYS = ["월", "화", "수", "목", "금", "토", "일"];

const SESSIONS_PER_CYCLE = 4; // 4회차마다 다음 달 교육비 선불 결제

function uid(prefix = "id") {
  return `${prefix}_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 7)}`;
}

const CHILD_PALETTE = [
  { bg: "#E7EFE4", text: "#3F5B41" },
  { bg: "#F6EAD9", text: "#8A5A22" },
  { bg: "#F5E1E4", text: "#8C3B4C" },
  { bg: "#E3E9EE", text: "#3C5066" },
  { bg: "#EAE6F2", text: "#5A4A7A" },
  { bg: "#DDEEF0", text: "#2E6670" },
];
function colorForChild(id) {
  let hash = 0;
  for (let i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) >>> 0;
  return CHILD_PALETTE[hash % CHILD_PALETTE.length];
}
const TEACHER_PALETTE = [
  { bg: "#EAE6F2", text: "#5A4A7A" }, // 보라
  { bg: "#DDEEF0", text: "#2E6670" }, // 청록
  { bg: "#F6EAD9", text: "#8A5A22" }, // 주황
  { bg: "#E7EFE4", text: "#3F5B41" }, // 초록
  { bg: "#F5E1E4", text: "#8C3B4C" }, // 로즈
  { bg: "#E3E9EE", text: "#3C5066" }, // 슬레이트
  { bg: "#FBE9D7", text: "#9C5A2E" }, // 갈색
  { bg: "#E5EBF7", text: "#3E5A96" }, // 파랑
];
function colorForTeacher(id) {
  // 고정된 색 8개를 나눠쓰지 않고, 색상환을 균등하게 회전시켜 매번 새로운 색을 배정.
  // 황금각(137.508˚)만큼 계속 회전하기 때문에 교사가 아무리 많아져도 서로 겹치지 않음.
  const idx = (DATA && Array.isArray(DATA.teachers)) ? DATA.teachers.findIndex(t => t.id === id) : -1;
  let seed = idx;
  if (seed === -1) {
    let hash = 0;
    for (let i = 0; i < id.length; i++) hash = (hash * 17 + id.charCodeAt(i)) >>> 0;
    seed = hash;
  }
  const hue = (seed * 137.508) % 360;
  return {
    bg: `hsl(${hue.toFixed(1)}, 48%, 89%)`,
    text: `hsl(${hue.toFixed(1)}, 48%, 28%)`,
  };
}
function teacherBadgeHtml(teacher) {
  if (!teacher) return `<span style="font-size:11.5px;color:var(--ink-soft);">미배정</span>`;
  const c = colorForTeacher(teacher.id);

}
function toDateStr(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function parseDateStr(s) {
  const [y,m,d] = s.split("-").map(Number);
  return new Date(y, m-1, d);
}
function daysUntil(date) {
  const today0 = new Date(); today0.setHours(0,0,0,0);
  const d0 = new Date(date); d0.setHours(0,0,0,0);
  return Math.round((d0 - today0) / 86400000);
}
/*
 * 수업 시작일부터 매주 1회 수업을 한다고 가정하고, 휴강(취소)된 주는 회차에서 제외한다.
 * 유효 회차가 4의 배수가 되는 날 = 다음 달 교육비를 선불로 결제하는 날.
 * 휴강이 생기면 그만큼 유효 회차 도달 시점이 뒤로 밀리면서 결제일도 함께 밀린다.
 * 단, 보강일이 등록된 휴강은 실제로는 수업이 진행된 것으로 보아 회차에서 제외하지 않는다.
 * (= 보강을 하면 결제일이 밀리지 않는다.)
 */
function computePaymentInfo(child, cancellations, payments) {
  if (!child.startDate) return null;
  const start = parseDateStr(child.startDate);
  const today = new Date(); today.setHours(0,0,0,0);
  const myCancelDates = new Set(
    cancellations.filter(c => c.childId === child.id && !c.makeupDate).map(c => c.date)
  );
  // 이 아동에 대해 이미 입금 처리된 결제일들 (관리자가 입금일을 입력해 확정한 회차)
  const paidDueDates = new Set(
    (payments || []).filter(p => p.childId === child.id).map(p => p.dueDate)
  );
  let validCount = 0;
  let d = new Date(start);
  let sessionsDoneBeforeToday = 0;
  for (let i = 0; i < 1000; i++) {
    const dateStr = toDateStr(d);
    const isCancelled = myCancelDates.has(dateStr);
    if (!isCancelled) {
      validCount++;
      if (d < today) sessionsDoneBeforeToday = validCount;
      // 결제 회차(4의 배수)에 도달했고, 아직 입금 처리가 안 된 가장 이른 회차를 찾는다.
      // (지나간 회차라도 입금 기록이 없으면 미납으로 간주해 계속 알려준다)
      if (validCount % SESSIONS_PER_CYCLE === 0 && !paidDueDates.has(dateStr)) {
        return {
          nextDate: new Date(d),
          dleft: daysUntil(d),
          isOverdue: d < today,
          cycleProgress: sessionsDoneBeforeToday % SESSIONS_PER_CYCLE,
        };
      }
    }
    d.setDate(d.getDate() + 7);
  }
  return null;
}
function getChildCancellations(childId, cancellations) {
  return cancellations.filter(c => c.childId === childId).sort((a,b) => a.date < b.date ? 1 : -1);
}
/* 오늘을 기준으로 앞뒤 N개의 수업 예정일을 생성 (휴강 체크용 빠른 선택지) */
function upcomingSessionDates(child, cancellations, pastCount = 2, futureCount = 4) {
  if (!child.startDate) return [];
  const start = parseDateStr(child.startDate);
  const today = new Date(); today.setHours(0,0,0,0);
  const all = [];
  let d = new Date(start);
  for (let i = 0; i < 1000; i++) {
    all.push(new Date(d));
    if (d > today && all.length > 400) break;
    d.setDate(d.getDate() + 7);
    if (d.getFullYear() > today.getFullYear() + 2) break;
  }
  let idx = all.findIndex(dt => dt >= today);
  if (idx === -1) idx = all.length - 1;
  const from = Math.max(0, idx - pastCount);
  const to = Math.min(all.length, idx + futureCount + 1);
  const myCancelMap = new Map(cancellations.filter(c => c.childId === child.id).map(c => [c.date, c]));
  return all.slice(from, to).map(dt => {
    const dateStr = toDateStr(dt);
    const rec = myCancelMap.get(dateStr);
    return { date: dt, dateStr, cancelled: !!rec, makeupDate: rec ? (rec.makeupDate || "") : "" };
  });
}
function formatDate(d) { return `${d.getMonth() + 1}월 ${d.getDate()}일`; }
function dDayLabel(dleft) {
  if (dleft === 0) return "오늘";
  if (dleft > 0) return `D-${dleft}`;
  return `${Math.abs(dleft)}일 지남`;
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function avatarHtml(name, colorId, size = 36) {
  const c = colorForChild(colorId || name || "x");

}

}

function attachLoginEvents() {
  document.querySelectorAll(".teacher-login-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      TEACHER_LOGIN_ID = btn.dataset.id; TEACHER_PIN_INPUT = ""; TEACHER_PIN_ERROR = ""; render();
    });
  });
  const openBtn = document.getElementById("admin-login-open");
  if (openBtn) openBtn.addEventListener("click", () => { SHOW_PIN_MODAL = true; PIN_INPUT = ""; PIN_ERROR = ""; render(); });

  const overlay = document.getElementById("pin-overlay");
  if (overlay) {
    overlay.addEventListener("mousedown", (e) => { if (e.target === overlay) { SHOW_PIN_MODAL = false; render(); } });
    const input = document.getElementById("pin-input");
    input.focus();
    input.addEventListener("input", (e) => { PIN_INPUT = e.target.value; PIN_ERROR = ""; });
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") submitPin(); });
    document.getElementById("pin-submit").addEventListener("click", submitPin);
  }

  const teacherOverlay = document.getElementById("teacher-pin-overlay");
  if (teacherOverlay) {
    teacherOverlay.addEventListener("mousedown", (e) => { if (e.target === teacherOverlay) { TEACHER_LOGIN_ID = null; render(); } });
    const tInput = document.getElementById("teacher-pin-input");
    tInput.focus();
    tInput.addEventListener("input", (e) => { TEACHER_PIN_INPUT = e.target.value; TEACHER_PIN_ERROR = ""; });
    tInput.addEventListener("keydown", (e) => { if (e.key === "Enter") submitTeacherPin(); });
    document.getElementById("teacher-pin-submit").addEventListener("click", submitTeacherPin);
    document.getElementById("teacher-pin-cancel").addEventListener("click", () => { TEACHER_LOGIN_ID = null; render(); });
  }
}
function submitPin() {
  if ((PIN_INPUT || "").trim() === (DATA.adminPin || "").trim()) {
    SHOW_PIN_MODAL = false; PIN_INPUT = ""; PIN_ERROR = "";
    CURRENT_USER = { role: "admin" }; ADMIN_TAB = "teachers";
    JUST_LOGGED_IN = true;
    render();
  } else {
    PIN_ERROR = "PIN 번호가 올바르지 않아요.";
    render();
    setTimeout(() => { const el = document.getElementById("pin-input"); if (el) el.focus(); }, 0);
  }
}
function submitTeacherPin() {
  const t = DATA.teachers.find(x => x.id === TEACHER_LOGIN_ID);
  if (!t) { TEACHER_LOGIN_ID = null; render(); return; }
  const expected = (t.pin || "").trim();
  const inputVal = (TEACHER_PIN_INPUT || "").trim();
  if (expected && inputVal === expected) {
    TEACHER_LOGIN_ID = null; TEACHER_PIN_INPUT = ""; TEACHER_PIN_ERROR = "";
    CURRENT_USER = { role: "teacher", id: t.id, name: t.name }; TEACHER_TAB = "timetable";
    JUST_LOGGED_IN = true;
    render();
  } else if (!expected) {
    TEACHER_PIN_ERROR = "PIN이 아직 설정되지 않았어요. 관리자님께 문의해주세요.";
    render();
  } else {
    TEACHER_PIN_ERROR = "PIN 번호가 올바르지 않아요.";
    render();
    setTimeout(() => { const el = document.getElementById("teacher-pin-input"); if (el) el.focus(); }, 0);
  }
}

/*  시간표 그리드                                                       */

function timetableGridHtml(entries, children, teacherColor) {
  if (entries.length === 0) {
    return emptyStateHtml('calendar', "등록된 시간표가 없어요", "관리자님께 시간표 등록을 요청해보세요.");
  }
  const times = Array.from(new Set(entries.map(e => e.time))).sort();
  const childMap = {}; children.forEach(c => childMap[c.id] = c);

  return `
    <div class="card scrollbar" style="overflow-x:auto;padding:14px;">
      <table>
        <thead><tr><th style="width:56px;"></th>
          ${DAYS.map(d => `<th class="planner-th" style="background:var(--paper-2);color:var(--ink);">${d}</th>`).join("")}
        </tr></thead>
        <tbody>
          ${times.map(time => `
            <tr>
              <td style="font-size:12px;color:var(--ink-soft);font-weight:700;text-align:center;white-space:nowrap;">${esc(time)}</td>
              ${DAYS.map(day => {
                const cell = entries.filter(e => e.day === day && e.time === time);
                return `<td style="min-width:96px;vertical-align:top;"><div style="display:grid;gap:4px;">
                  ${cell.map(e => {
  const child = childMap[e.childId];
  if (!child) return "";
  const c = teacherColor || colorForChild(child.id);
  return `<div style="background:${c.bg};color:${c.text};border-radius:8px;padding:6px 8px;font-size:12.5px;font-weight:700;text-align:center;">
    ${esc(child.name)}
    ${e.endTime ? `<div style="font-size:10px;font-weight:500;opacity:.75;margin-top:2px;">${esc(e.time)}~${esc(e.endTime)}</div>` : ""}
  </div>`;
}).join("")}
                </div></td>`;
              }).join("")}
            </tr>`).join("")}
        </tbody>
      </table>
    </div>`;
}

function emptyStateHtml(iconName, title, desc) {
  return `
    <div class="card empty">
      <div class="empty-icon">${icon(iconName, 22, 'var(--ink-soft)')}</div>
      <div style="font-weight:700;margin-bottom:4px;">${esc(title)}</div>
      ${desc ? `<div style="font-size:13.5px;color:var(--ink-soft);">${esc(desc)}</div>` : ""}
    </div>`;
}

function confirmInlineHtml(type, id, text = "삭제할까요?") {
  return `
    <div class="fadein" style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:13px;color:var(--rose);font-weight:600;">${esc(text)}</span>
      <button class="btn btn-danger confirm-yes" data-type="${type}" data-id="${id}" style="padding:5px 10px;font-size:12.5px;">삭제</button>

function attachTeacherEvents() {
  document.getElementById("logout-btn").addEventListener("click", () => { CURRENT_USER = null; SHOW_PAYMENT_POPUP = false; render(); });
  document.querySelectorAll("[data-tteacher]").forEach(el => el.addEventListener("click", () => { TEACHER_TAB = el.dataset.tteacher; render(); }));
  document.querySelectorAll(".go-note-btn").forEach(el => el.addEventListener("click", () => { TEACHER_TAB = "notes"; NOTE_CHILD_ID = el.dataset.id; render(); }));
  document.querySelectorAll(".note-child-tab").forEach(el => el.addEventListener("click", () => { NOTE_CHILD_ID = el.dataset.id; NOTE_TEXT = ""; render(); }));

  const noteText = document.getElementById("note-text");
  if (noteText) {
    noteText.addEventListener("input", (e) => {
      NOTE_TEXT = e.target.value;
      const btn = document.getElementById("add-note-btn");
      if (btn) btn.disabled = !NOTE_TEXT.trim();
    });
  }
  const addNoteBtn = document.getElementById("add-note-btn");
  if (addNoteBtn) addNoteBtn.addEventListener("click", () => {
    if (!NOTE_CHILD_ID || !NOTE_TEXT.trim()) return;
    DATA.notes = [{ id: uid("note"), childId: NOTE_CHILD_ID, teacherId: CURRENT_USER.id, content: NOTE_TEXT.trim(), createdAt: new Date().toISOString() }, ...DATA.notes];
    NOTE_TEXT = "";
    persist();
  });
  document.querySelectorAll(".del-note-btn").forEach(el => el.addEventListener("click", () => { PENDING_DELETE = { type: "note", id: el.dataset.id }; render(); }));
  document.querySelectorAll(".confirm-yes").forEach(el => el.addEventListener("click", () => {
    if (el.dataset.type === "note") { DATA.notes = DATA.notes.filter(n => n.id !== el.dataset.id); PENDING_DELETE = null; persist(); }
  }));
  document.querySelectorAll(".confirm-no").forEach(el => el.addEventListener("click", () => { PENDING_DELETE = null; render(); }));

  // 휴강 체크: 빠른 칩
  document.querySelectorAll(".cancel-chip-open").forEach(el => el.addEventListener("click", () => {
    const childId = el.dataset.child, dateStr = el.dataset.date;
    if (CANCEL_OPEN && CANCEL_OPEN.childId === childId && CANCEL_OPEN.dateStr === dateStr) {
      CANCEL_OPEN = null;
    } else {
      CANCEL_OPEN = { childId, dateStr }; CANCEL_REASON_INPUT = ""; CANCEL_MAKEUP_CHECK = false; CANCEL_MAKEUP_DATE_INPUT = "";
    }
    render();
  }));
  document.querySelectorAll(".cancel-chip-restore").forEach(el => el.addEventListener("click", () => {
    const childId = el.dataset.child, dateStr = el.dataset.date;
    DATA.cancellations = DATA.cancellations.filter(x => !(x.childId === childId && x.date === dateStr));
    persist();
  }));
  const cancelReasonInput = document.getElementById("cancel-reason-input");
  if (cancelReasonInput) cancelReasonInput.addEventListener("input", (e) => { CANCEL_REASON_INPUT = e.target.value; });
  const cancelMakeupCheck = document.getElementById("cancel-makeup-check");
  if (cancelMakeupCheck) cancelMakeupCheck.addEventListener("change", (e) => {
    const reasonEl = document.getElementById("cancel-reason-input");
    if (reasonEl) CANCEL_REASON_INPUT = reasonEl.value;
    CANCEL_MAKEUP_CHECK = e.target.checked;
    render();
  });
  const cancelMakeupDateInput = document.getElementById("cancel-makeup-date-input");
  if (cancelMakeupDateInput) cancelMakeupDateInput.addEventListener("input", (e) => { CANCEL_MAKEUP_DATE_INPUT = e.target.value; });
  document.querySelectorAll(".cancel-confirm-btn").forEach(el => el.addEventListener("click", () => {
    const childId = el.dataset.child, dateStr = el.dataset.date;
    const makeupDate = CANCEL_MAKEUP_CHECK ? CANCEL_MAKEUP_DATE_INPUT : "";
    DATA.cancellations = [...DATA.cancellations, { id: uid("cx"), childId, date: dateStr, reason: CANCEL_REASON_INPUT.trim(), makeupDate, teacherId: CURRENT_USER.id, createdAt: new Date().toISOString() }];
    CANCEL_OPEN = null; CANCEL_REASON_INPUT = ""; CANCEL_MAKEUP_CHECK = false; CANCEL_MAKEUP_DATE_INPUT = "";
    persist();
  }));
  document.querySelectorAll(".cancel-cancel-btn").forEach(el => el.addEventListener("click", () => { CANCEL_OPEN = null; render(); }));

  // 휴강 체크: 직접 날짜 등록
  const manualAddBtn = document.getElementById("manual-cancel-add-btn");
  if (manualAddBtn) manualAddBtn.addEventListener("click", () => {
    const childId = document.getElementById("manual-cancel-child").value;
    const date = document.getElementById("manual-cancel-date").value;
    const reason = document.getElementById("manual-cancel-reason").value.trim();
    const makeupDateEl = document.getElementById("manual-cancel-makeup-date");
    const makeupDate = CANCEL_MANUAL_FORM.makeup ? (makeupDateEl ? makeupDateEl.value : "") : "";
    if (!childId || !date) return;
    const exists = DATA.cancellations.some(x => x.childId === childId && x.date === date);
    if (exists) {
      DATA.cancellations = DATA.cancellations.map(x => (x.childId === childId && x.date === date) ? { ...x, reason, makeupDate } : x);
    } else {
      DATA.cancellations = [...DATA.cancellations, { id: uid("cx"), childId, date, reason, makeupDate, teacherId: CURRENT_USER.id, createdAt: new Date().toISOString() }];
    }
    CANCEL_MANUAL_FORM = { childId: "", date: "", reason: "", makeup: false, makeupDate: "" };
    persist();
  });
  const manualMakeupCheck = document.getElementById("manual-cancel-makeup-check");
  if (manualMakeupCheck) manualMakeupCheck.addEventListener("change", (e) => {
    CANCEL_MANUAL_FORM.childId = document.getElementById("manual-cancel-child").value;
    CANCEL_MANUAL_FORM.date = document.getElementById("manual-cancel-date").value;
    CANCEL_MANUAL_FORM.reason = document.getElementById("manual-cancel-reason").value;
    CANCEL_MANUAL_FORM.makeup = e.target.checked;
    render();
  });
  const manualMakeupDateInput = document.getElementById("manual-cancel-makeup-date");
  if (manualMakeupDateInput) manualMakeupDateInput.addEventListener("input", (e) => { CANCEL_MANUAL_FORM.makeupDate = e.target.value; });
  document.querySelectorAll(".del-cancellation-btn").forEach(el => el.addEventListener("click", () => {
    DATA.cancellations = DATA.cancellations.filter(x => x.id !== el.dataset.id);
    persist();
  }));
  document.querySelectorAll(".edit-makeup-btn").forEach(el => el.addEventListener("click", () => {
    const rec = DATA.cancellations.find(x => x.id === el.dataset.id);
    MAKEUP_EDIT_ID = el.dataset.id;
    MAKEUP_EDIT_DATE = rec && rec.makeupDate ? rec.makeupDate : "";
    render();
  }));
  document.querySelectorAll(".cancel-makeup-edit-btn").forEach(el => el.addEventListener("click", () => { MAKEUP_EDIT_ID = null; render(); }));
  document.querySelectorAll(".save-makeup-btn").forEach(el => el.addEventListener("click", () => {
    const id = el.dataset.id;
    const val = document.getElementById("makeup-edit-date-input").value;
    DATA.cancellations = DATA.cancellations.map(x => x.id === id ? { ...x, makeupDate: val || "" } : x);
    MAKEUP_EDIT_ID = null;
    persist();
  }));

  const popupOverlay = document.getElementById("payment-overlay");
  if (popupOverlay) {
    popupOverlay.addEventListener("mousedown", (e) => { if (e.target === popupOverlay) { SHOW_PAYMENT_POPUP = false; render(); } });
    document.getElementById("close-payment-popup").addEventListener("click", () => { SHOW_PAYMENT_POPUP = false; render(); });
  }

  // 결제 임박 팝업: 핀번호로 로그인할 때마다 표시 (결제 예정일 당일까지는 다시 로그인하면 반복해서 뜸)
  if (JUST_LOGGED_IN) {
    JUST_LOGGED_IN = false;
    const myChildren = DATA.children.filter(c => c.teacherId === CURRENT_USER.id);
    const due = myChildren.map(c => {
      const info = computePaymentInfo(c, DATA.cancellations, DATA.payments);
      return { ...c, dleft: info ? info.dleft : null };
    }).filter(c => c.dleft !== null && c.dleft <= 3);
    if (due.length > 0) { SHOW_PAYMENT_POPUP = true; render(); }
  }
}

function adminAppHtml() {
  const tabs = [
    { key: "teachers", label: "교사 관리", icon: "users" },

  else if (ADMIN_TAB === "children") body = childrenPanelHtml();
  else if (ADMIN_TAB === "schedule") body = schedulePanelHtml();
  else if (ADMIN_TAB === "notes") body = notesPanelHtml();
  else if (ADMIN_TAB === "payments") body = paymentsPanelHtml();

  const extra = `<button id="settings-open" class="btn btn-ghost" style="padding:8px 10px;">${icon('settings',14)}</button>`;
  const settingsModal = SHOW_SETTINGS ? `
    <div class="modal-overlay" id="settings-overlay">
      <div class="card fadein" style="width:100%;max-width:360px;padding:22px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <h2 style="font-size:16px;font-weight:700;margin:0;">설정</h2>
          <button id="settings-close" class="btn btn-ghost" style="padding:6px;">${icon('x',16)}</button>
        </div>
        <label style="font-size:12.5px;font-weight:600;color:var(--ink-soft);">관리자 PIN 변경</label>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <input id="new-pin-input" class="input" style="flex:1;" placeholder="새 PIN (4자리 이상)" inputmode="numeric" />
          <button id="save-pin-btn" class="btn btn-primary" style="padding:0 14px;">저장</button>
        </div>
        ${PIN_SAVE_MSG ? `<div style="color:var(--moss);font-size:12.5px;margin-top:8px;display:flex;gap:4px;align-items:center;">${icon('check',13)} 변경되었어요</div>` : ""}
      </div>
    </div>` : "";

  // 결제 임박/미납 아동을 결제일이 같은 그룹으로 묶기
  const adminDueGroups = (() => {
    const dueChildren = DATA.children.map(c => {
      const info = computePaymentInfo(c, DATA.cancellations, DATA.payments);
      return { ...c, nextDate: info ? info.nextDate : null, dleft: info ? info.dleft : null, isOverdue: info ? info.isOverdue : false };
    }).filter(c => c.dleft !== null && c.dleft <= 3);
    const map = new Map();
    dueChildren.forEach(c => {
      const key = toDateStr(c.nextDate);
      if (!map.has(key)) map.set(key, { date: c.nextDate, dleft: c.dleft, isOverdue: c.isOverdue, names: [] });
      map.get(key).names.push(c.name);
    });
    return Array.from(map.values()).sort((a, b) => a.dleft - b.dleft);
  })();

  const adminPaymentPopup = SHOW_ADMIN_PAYMENT_POPUP && adminDueGroups.length > 0 ? `
    <div class="modal-overlay" id="admin-payment-overlay">
      <div class="card fadein" style="width:100%;max-width:400px;padding:22px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <div style="padding:8px;border-radius:10px;background:#F6EAD9;">${icon('wallet',18,'var(--amber)')}</div>
          <h2 style="font-size:16.5px;font-weight:700;margin:0;">결제일 알림</h2>
        </div>
        <p style="font-size:13px;color:var(--ink-soft);margin:6px 0 14px;">곧 결제일이거나 결제가 밀린 아동이 있어요.</p>
        <div style="display:grid;gap:12px;max-height:360px;overflow-y:auto;">
          ${adminDueGroups.map(g => `
            <div style="border-radius:12px;background:${g.isOverdue?"#FBE3E1":g.dleft===0?"#F6EAD9":"var(--paper-2)"};padding:10px 12px;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
                <div style="font-size:11.5px;color:var(--ink-soft);">${formatDate(g.date)} 결제 예정</div>
                <div style="font-weight:700;font-size:13px;color:${g.isOverdue?"#C0463A":g.dleft===0?"var(--amber)":"var(--ink-soft)"};">${g.isOverdue?"미납 · ":""}${dDayLabel(g.dleft)}</div>
              </div>
              <div style="display:grid;gap:4px;">
                ${g.names.map(n => `<div style="font-weight:600;font-size:14px;">${esc(n)}</div>`).join("")}
              </div>
            </div>`).join("")}
        </div>
        <button id="close-admin-payment-popup" class="btn btn-primary" style="width:100%;padding:10px 0;margin-top:16px;">확인했어요</button>
      </div>
    </div>` : "";

  return `
    ${topBarHtml("관리자 대시보드", `선생님 ${DATA.teachers.length}명 · 아동 ${DATA.children.length}명`, tabs, ADMIN_TAB, "tadmin", extra)}

function schedulePanelHtml() {
  if (!SCHEDULE_VIEW_TEACHER && DATA.teachers.length > 0) {
    SCHEDULE_VIEW_TEACHER = DATA.teachers[0].id;
  }
  const activeTeacher = DATA.teachers.find(t => t.id === SCHEDULE_VIEW_TEACHER) || null;
  const activeColor = activeTeacher ? colorForTeacher(activeTeacher.id) : null;

  const scheduleTeacherTabs = DATA.teachers.length === 0 ? "" : `
    <div class="scrollbar" style="display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;">
      ${DATA.teachers.map(t => {
        const tc = colorForTeacher(t.id);
        const isActive = SCHEDULE_VIEW_TEACHER === t.id;
        return `<div class="tab schedule-view-tab" data-id="${t.id}" style="background:${isActive ? tc.bg : "transparent"};color:${isActive ? tc.text : "var(--ink-soft)"};border:1px solid ${isActive ? tc.bg : "var(--line)"};">
          ${esc(t.name)} 선생님
        </div>`;
      }).join("")}
    </div>`;
  const gridChildIds = activeTeacher ? new Set(DATA.children.filter(c => c.teacherId === activeTeacher.id).map(c => c.id)) : new Set();
  const gridEntries = DATA.schedule.filter(s => gridChildIds.has(s.childId));
  const gridChildren = DATA.children.filter(c => gridChildIds.has(c.id));

  const scheduleFormChildren = activeTeacher ? DATA.children.filter(c => c.teacherId === activeTeacher.id) : DATA.children;
  const childOptions = `<option value="">아동 선택</option>` + scheduleFormChildren.map(c => {
    const t = DATA.teachers.find(tt => tt.id === c.teacherId);
    return `<option value="${c.id}" ${SCHEDULE_FORM.childId===c.id?"selected":""}>${esc(c.name)} ${t?`(${esc(t.name)})`:"(미배정)"}</option>`;
  }).join("");
  const dayOptions = DAYS.map(d => `<option value="${d}" ${SCHEDULE_FORM.day===d?"selected":""}>${d}요일</option>`).join("");

  const sorted = [...DATA.schedule]
    .filter(s => !activeTeacher || gridChildIds.has(s.childId))
    .sort((a,b) => DAYS.indexOf(a.day)-DAYS.indexOf(b.day) || a.time.localeCompare(b.time));
  const rows = sorted.map(s => {
    const child = DATA.children.find(c => c.id === s.childId);
    const teacher = child ? DATA.teachers.find(t => t.id === child.teacherId) : null;
    return `
      <div class="card" style="padding:10px 14px;display:flex;align-items:center;gap:10px;">
        <div style="font-weight:700;font-size:13px;width:40px;">${s.day}</div>
       <div style="font-size:13px;color:var(--ink-soft);white-space:nowrap;display:flex;align-items:center;gap:4px;">${icon('clock',12)}${s.time}${s.endTime ? ` ~ ${s.endTime}` : ""}</div>
        <div style="flex:1;font-size:13.5px;font-weight:600;">${child ? esc(child.name) : "(삭제된 아동)"}</div>
        ${teacherBadgeHtml(teacher)}
        ${PENDING_DELETE && PENDING_DELETE.type === "schedule" && PENDING_DELETE.id === s.id
          ? confirmInlineHtml("schedule", s.id)
          : `<button class="btn btn-ghost del-schedule-btn" data-id="${s.id}" style="padding:6px;">${icon('trash',13)}</button>`}
      </div>`;
  }).join("");

  return `
    <h2 style="font-size:15px;font-weight:700;margin-bottom:10px;">교사별 시간표</h2>
    ${DATA.teachers.length === 0
      ? emptyStateHtml('users', "등록된 선생님이 없어요", "먼저 교사 관리에서 선생님을 등록해주세요.")
      : `${scheduleTeacherTabs}${timetableGridHtml(gridEntries, gridChildren, activeColor)}`}

    <h2 style="font-size:15px;font-weight:700;margin:22px 0 10px;">시간표 관리${activeTeacher ? ` · ${esc(activeTeacher.name)} 선생님` : ""}</h2>
    <div class="card" style="padding:16px;margin-bottom:14px;">
      <div style="font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:10px;">새 수업 등록</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <select id="sched-child" class="select" style="flex:2;min-width:140px;">${childOptions}</select>
        <select id="sched-day" class="select" style="min-width:80px;">${dayOptions}</select>
      <input id="sched-time" class="input" style="min-width:100px;" type="time" value="${SCHEDULE_FORM.time}" />
<span style="align-self:center;color:var(--ink-soft);">~</span>
<input id="sched-end-time" class="input" style="min-width:100px;" type="time" value="${SCHEDULE_FORM.endTime || ""}" />

    ${sorted.length === 0 ? emptyStateHtml('calendar', "등록된 시간표가 없어요") : `<div style="display:grid;gap:6px;">${rows}</div>`}`;
}

function paymentsPanelHtml() {
  const todayStr = toDateStr(new Date());
  const rows = DATA.children.map(c => {
    const info = computePaymentInfo(c, DATA.cancellations, DATA.payments);
    const teacher = DATA.teachers.find(t => t.id === c.teacherId);
    return { ...c, nextDate: info ? info.nextDate : null, dleft: info ? info.dleft : null, isOverdue: info ? info.isOverdue : false, teacher };
  }).sort((a,b) => (a.dleft ?? 9999) - (b.dleft ?? 9999));

  const rowsHtml = rows.map(c => `
    <div class="card" style="padding:14px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="flex:1;">
          <div style="font-weight:700;font-size:14px;">${esc(c.name)}</div>
          <div style="font-size:12px;color:var(--ink-soft);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            ${teacherBadgeHtml(c.teacher)}
            <span>${c.nextDate ? `다음 결제일 ${formatDate(c.nextDate)}` : "수업 시작일 미설정"}</span>
          </div>
        </div>
        ${c.nextDate ? `<div style="font-weight:700;font-size:12.5px;padding:5px 10px;border-radius:999px;background:${c.isOverdue?"#FBE3E1":c.dleft<=3?"#F6EAD9":"var(--paper-2)"};color:${c.isOverdue?"#C0463A":c.dleft<=3?"var(--amber)":"var(--ink-soft)"};white-space:nowrap;">${c.isOverdue?"미납 · ":""}${dDayLabel(c.dleft)}</div>` : ""}
      </div>
      ${c.nextDate ? `
      <div style="display:flex;gap:8px;margin-top:10px;">
        <input type="date" class="input pay-date-input" data-child="${c.id}" style="flex:1;font-size:12.5px;padding:8px 10px;" value="${todayStr}" />
        <button class="btn btn-primary confirm-payment-btn" data-child="${c.id}" data-due="${toDateStr(c.nextDate)}" style="padding:0 14px;white-space:nowrap;">입금 확인</button>
      </div>` : ""}
    </div>`).join("");

  const recentPayments = [...DATA.payments].sort((a,b) => a.paidDate < b.paidDate ? 1 : -1).slice(0, 30);
  const paymentsHistoryHtml = recentPayments.length === 0
    ? `<div style="font-size:13px;color:var(--ink-soft);">입금 처리 내역이 없어요.</div>`
    : `<div style="display:grid;gap:8px;">${recentPayments.map(p => {
        const child = DATA.children.find(cc => cc.id === p.childId);
        return `<div class="card" style="padding:12px 14px;display:flex;align-items:center;gap:10px;">
          <div style="flex:1;">
            <div style="font-weight:700;font-size:13.5px;">${child ? esc(child.name) : "(삭제된 아동)"}</div>
            <div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">결제 예정일 ${esc(p.dueDate)} · 입금일 ${esc(p.paidDate)}</div>
          </div>
          <button class="btn btn-ghost undo-payment-btn" data-id="${p.id}" style="padding:6px;">${icon('trash',13)}</button>
        </div>`;
      }).join("")}</div>`;

  const cancellations = [...DATA.cancellations].sort((a,b) => a.date < b.date ? 1 : -1);
  const cancelHtml = cancellations.length === 0
    ? `<div style="font-size:13px;color:var(--ink-soft);">등록된 휴강이 없어요.</div>`
    : `<div style="display:grid;gap:8px;">${cancellations.map(x => {
        const child = DATA.children.find(cc => cc.id === x.childId);
        const teacher = DATA.teachers.find(t => t.id === x.teacherId);
        return `<div class="card" style="padding:12px 14px;display:flex;align-items:center;gap:10px;">
          <div style="flex:1;">
            <div style="font-weight:700;font-size:13.5px;">${child?esc(child.name):"(삭제된 아동)"} · ${esc(x.date)}</div>
            <div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">${teacher?`${esc(teacher.name)} 선생님 · `:""}${esc(x.reason || "사유 없음")}</div>
            ${x.makeupDate
              ? `<div style="font-size:12px;color:var(--amber);margin-top:4px;font-weight:600;">${icon('calendar',12)} 보강일 ${esc(x.makeupDate)} · 결제일 유지</div>`
              : `<div style="font-size:11.5px;color:var(--rose);margin-top:4px;">보강 없음 · 결제일 밀림</div>`}
          </div>
          <button class="btn btn-ghost del-cancellation-admin-btn" data-id="${x.id}" style="padding:6px;">${icon('trash',13)}</button>
        </div>`;
      }).join("")}</div>`;

  return `
    <h2 style="font-size:15px;font-weight:700;margin-bottom:10px;">결제 현황</h2>
    ${rows.length === 0 ? emptyStateHtml('wallet', "등록된 아동이 없어요") : `<div style="display:grid;gap:8px;">${rowsHtml}</div>`}
    <h2 style="font-size:15px;font-weight:700;margin:22px 0 10px;">입금 처리 내역</h2>
    ${paymentsHistoryHtml}
    <h2 style="font-size:15px;font-weight:700;margin:22px 0 10px;">휴강 내역</h2>
    ${cancelHtml}`;
}

function attachAdminEvents() {
  document.getElementById("logout-btn").addEventListener("click", () => { CURRENT_USER = null; SHOW_ADMIN_PAYMENT_POPUP = false; render(); });
  document.querySelectorAll("[data-tadmin]").forEach(el => el.addEventListener("click", () => { ADMIN_TAB = el.dataset.tadmin; render(); }));

  document.querySelectorAll(".confirm-payment-btn").forEach(el => el.addEventListener("click", () => {
    const childId = el.dataset.child;
    const due = el.dataset.due;
    const dateInput = document.querySelector(`.pay-date-input[data-child="${childId}"]`);
    const paidDate = dateInput ? dateInput.value : "";
    if (!due) return;
    if (!paidDate) { alert("입금일을 선택해주세요."); return; }
    DATA.payments.push({ id: uid("pay"), childId, dueDate: due, paidDate });
    persist();
  }));
  document.querySelectorAll(".undo-payment-btn").forEach(el => el.addEventListener("click", () => {
    if (!confirm("이 입금 처리를 취소할까요? 취소하면 다시 미납/결제 예정 상태로 돌아가요.")) return;
    DATA.payments = DATA.payments.filter(p => p.id !== el.dataset.id);
    persist();
  }));

  const settingsOpen = document.getElementById("settings-open");
  if (settingsOpen) settingsOpen.addEventListener("click", () => { SHOW_SETTINGS = true; PIN_SAVE_MSG = false; render(); });
  const settingsOverlay = document.getElementById("settings-overlay");
  if (settingsOverlay) {
    settingsOverlay.addEventListener("mousedown", (e) => { if (e.target === settingsOverlay) { SHOW_SETTINGS = false; render(); } });
    document.getElementById("settings-close").addEventListener("click", () => { SHOW_SETTINGS = false; render(); });
    document.getElementById("save-pin-btn").addEventListener("click", () => {
      const val = document.getElementById("new-pin-input").value.trim();
      if (val.length < 4) return;
      DATA.adminPin = val;
      PIN_SAVE_MSG = true;
      persist();
      setTimeout(() => { PIN_SAVE_MSG = false; render(); }, 1500);
    });
  }

  // 교사 관리
  const addTeacherBtn = document.getElementById("add-teacher-btn");
  if (addTeacherBtn) {
    const nameInput = document.getElementById("teacher-name-input");
    const pinInput = document.getElementById("teacher-pin-new-input");
    const addTeacher = () => {
      const name = nameInput.value.trim();
      const pin = pinInput.value.trim();
      if (!name) return;
      DATA.teachers = [...DATA.teachers, { id: uid("t"), name, pin: pin || "" }];
      persist();
    };
    addTeacherBtn.addEventListener("click", addTeacher);
    nameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addTeacher(); });
    pinInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addTeacher(); });
  }
  document.querySelectorAll(".del-teacher-btn").forEach(el => el.addEventListener("click", () => { PENDING_DELETE = { type: "teacher", id: el.dataset.id }; render(); }));
  document.querySelectorAll(".edit-teacher-pin-btn").forEach(el => el.addEventListener("click", () => {
    const t = DATA.teachers.find(x => x.id === el.dataset.id);
    EDIT_TEACHER_PIN_ID = el.dataset.id;
    EDIT_TEACHER_PIN_VALUE = t && t.pin ? t.pin : "";
    render();
  }));
  document.querySelectorAll(".cancel-teacher-pin-btn").forEach(el => el.addEventListener("click", () => { EDIT_TEACHER_PIN_ID = null; render(); }));
  document.querySelectorAll(".save-teacher-pin-btn").forEach(el => el.addEventListener("click", () => {
    const val = document.getElementById("edit-pin-input").value.trim();
    if (val.length < 4) return;
    DATA.teachers = DATA.teachers.map(t => t.id === el.dataset.id ? { ...t, pin: val } : t);
    EDIT_TEACHER_PIN_ID = null;
    persist();
  }));

  // 아동 관리
  const addChildBtn = document.getElementById("add-child-btn");
  if (addChildBtn) {
    addChildBtn.addEventListener("click", () => {
      const name = document.getElementById("new-child-name").value.trim();
      const age = document.getElementById("new-child-age").value;
      const startDate = document.getElementById("new-child-startdate").value;
      const teacherId = document.getElementById("new-child-teacher").value;
      if (!name || !age) return;
      DATA.children = [...DATA.children, { id: uid("c"), name, age: Number(age), startDate: startDate || "", teacherId: teacherId || null }];
      CHILD_FORM = { name: "", age: "", startDate: "", teacherId: "" };
      persist();
    });
  }
  document.querySelectorAll(".child-age-input").forEach(el => el.addEventListener("change", () => {
  const val = Number(el.value);
  if (!val || val < 0) return;
  DATA.children = DATA.children.map(c => c.id === el.dataset.id ? { ...c, age: val } : c);
  persist();
}));
document.querySelectorAll(".child-startdate-input").forEach(el => el.addEventListener("change", () => {
  DATA.children = DATA.children.map(c => c.id === el.dataset.id ? { ...c, startDate: el.value || "" } : c);
  persist();
}));
document.querySelectorAll(".child-teacher-select").forEach(el => el.addEventListener("change", () => {
  DATA.children = DATA.children.map(c => c.id === el.dataset.id ? { ...c, teacherId: el.value || null } : c);
  persist();
}));
  document.querySelectorAll(".del-child-btn").forEach(el => el.addEventListener("click", () => { PENDING_DELETE = { type: "child", id: el.dataset.id }; render(); }));
  document.querySelectorAll(".del-cancellation-admin-btn").forEach(el => el.addEventListener("click", () => {
    DATA.cancellations = DATA.cancellations.filter(x => x.id !== el.dataset.id);
    persist();
  }));

  // 시간표
  const addScheduleBtn = document.getElementById("add-schedule-btn");
  if (addScheduleBtn) {
    addScheduleBtn.addEventListener("click", () => {
  const childId = document.getElementById("sched-child").value;
  const day = document.getElementById("sched-day").value;
  const time = document.getElementById("sched-time").value;
  const endTime = document.getElementById("sched-end-time").value;
  if (!childId) return;
  DATA.schedule = [...DATA.schedule, { id: uid("s"), childId, day, time, endTime: endTime || "" }];
  persist();
});
  }
  document.querySelectorAll(".del-schedule-btn").forEach(el => el.addEventListener("click", () => { PENDING_DELETE = { type: "schedule", id: el.dataset.id }; render(); }));

  // 특이사항 필터
  const notesFilter = document.getElementById("notes-filter");
  if (notesFilter) notesFilter.addEventListener("change", (e) => { NOTES_FILTER_TEACHER = e.target.value; render(); });

  // 아동 관리: 교사별 탭 필터
  document.querySelectorAll(".children-filter-tab").forEach(el => el.addEventListener("click", () => {
    CHILDREN_FILTER_TEACHER = el.dataset.id;
    render();
  }));

  // 시간표: 교사별 탭 필터
  document.querySelectorAll(".schedule-view-tab").forEach(el => el.addEventListener("click", () => {
    SCHEDULE_VIEW_TEACHER = el.dataset.id;
    SCHEDULE_FORM.childId = "";
    render();
  }));

  // 삭제 확인/취소 공통
  const adminPopupOverlay = document.getElementById("admin-payment-overlay");
  if (adminPopupOverlay) {
    adminPopupOverlay.addEventListener("mousedown", (e) => { if (e.target === adminPopupOverlay) { SHOW_ADMIN_PAYMENT_POPUP = false; render(); } });
    document.getElementById("close-admin-payment-popup").addEventListener("click", () => { SHOW_ADMIN_PAYMENT_POPUP = false; render(); });
  }

  // 결제 임박 팝업: 핀번호로 로그인할 때마다 표시 (결제 예정일 당일까지는 다시 로그인하면 반복해서 뜸)
  if (JUST_LOGGED_IN) {
    JUST_LOGGED_IN = false;
    const due = DATA.children.map(c => {
      const info = computePaymentInfo(c, DATA.cancellations, DATA.payments);
      return { ...c, dleft: info ? info.dleft : null };
    }).filter(c => c.dleft !== null && c.dleft <= 3);
    if (due.length > 0) { SHOW_ADMIN_PAYMENT_POPUP = true; render(); }
  }

  document.querySelectorAll(".confirm-yes").forEach(el => el.addEventListener("click", () => {
    const { type, id } = el.dataset;
    if (type === "teacher") {
      DATA.teachers = DATA.teachers.filter(t => t.id !== id);
      DATA.children = DATA.children.map(c => c.teacherId === id ? { ...c, teacherId: null } : c);
    } else if (type === "child") {
      DATA.children = DATA.children.filter(c => c.id !== id);
      DATA.schedule = DATA.schedule.filter(s => s.childId !== id);
      DATA.notes = DATA.notes.filter(n => n.childId !== id);
      DATA.cancellations = DATA.cancellations.filter(x => x.childId !== id);
    } else if (type === "schedule") {
      DATA.schedule = DATA.schedule.filter(s => s.id !== id);
    }
    PENDING_DELETE = null;
    persist();
  }));
  document.querySelectorAll(".confirm-no").forEach(el => el.addEventListener("click", () => { PENDING_DELETE = null; render(); }));
}

/* ------------------------------------------------------------------ */
/*  초기화                                                              */
/* ------------------------------------------------------------------ */
function migrateData(d) {
  if (!Array.isArray(d.cancellations)) d.cancellations = [];
  if (!Array.isArray(d.teachers)) d.teachers = [];
  if (!Array.isArray(d.children)) d.children = [];
  if (!Array.isArray(d.schedule)) d.schedule = [];
  if (!Array.isArray(d.notes)) d.notes = [];
  if (!Array.isArray(d.payments)) d.payments = [];
  d.cancellations = d.cancellations.map(x => ({ ...x, makeupDate: x.makeupDate || "" }));
  d.teachers = d.teachers.map(t => ({ ...t, pin: t.pin || "" }));
  d.children = d.children.map(c => {
    const nc = { ...c };
    if (typeof nc.startDate !== "string") nc.startDate = "";
    delete nc.paymentDay; // 이전 방식(매월 고정일 결제)은 더 이상 사용하지 않음
    return nc;
  });
  return d;
}
db.ref('app-data').on('value', (snapshot) => {
  const val = snapshot.val();
  DATA = val ? migrateData(val) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  render();
});
</script>
</body>
</html>
